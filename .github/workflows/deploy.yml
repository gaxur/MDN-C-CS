name: Deploy to Cluster
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy files to cluster
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PASSWORD: ${{ secrets.SSH_PASS }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          sudo apt-get install -y sshpass

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Debug: verify the private key
          ssh-keygen -y -f ~/.ssh/id_ed25519 || echo "CLAVE INVALIDA"

          # Add the SSH host to known_hosts to prevent host key verification issues
          ssh-keyscan -t rsa,ed25519 "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "Copying files to cluster..."
          export SSHPASS="$SSH_PASSWORD"
          
          # Use rsync to copy files, excluding specified directories and files
          sshpass -e rsync -avz --delete --checksum \
            -e "ssh -i ~/.ssh/id_ed25519 \
                    -o StrictHostKeyChecking=no \
                    -o UserKnownHostsFile=~/.ssh/known_hosts \
                    -o PreferredAuthentications=publickey,password \
                    -o PubkeyAuthentication=yes" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='.venv' \
            --exclude='.ipynb_checkpoints' \
            --exclude='data/' \
            --exclude='results/' \
            --exclude='reports/' \
            . "$SSH_USER@$SSH_HOST:~/cvcs2026/MDN-C-CS/" || exit 1

          echo "Deploy completed successfully!"