name: Deploy to Cluster

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/github_actions_mdn
          chmod 600 ~/.ssh/github_actions_mdn

      - name: Deploy to cluster with password auth
        env:
          SSH_PASS: ${{ secrets.SSH_PASSWORD }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          expect << EOF
          set timeout 120
          spawn rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" ./ $SSH_USER@$SSH_HOST:~/cvcs2026/MDN-C-CS/
          expect {
            "*password:*" {
              send "$SSH_PASS\r"
              exp_continue
            }
            "*yes/no*" {
              send "yes\r"
              exp_continue
            }
            timeout { exit 1 }
            eof
          }
          EOF
