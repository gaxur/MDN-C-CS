name: Deploy to Cluster
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y sshpass rsync

      - name: Copy files to cluster
        env:
          SSH_PASS: ${{ secrets.SSH_PASSWORD }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          # Captura la clave del host para evitar prompt interactivo
          ssh-keyscan -t rsa,ed25519 "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "Copying files to cluster..."
          # FIX 1: sshpass solo UNA vez, fuera del --rsh
          # FIX 2: SSHPASS como variable de entorno para evitar problemas con caracteres especiales
          export SSHPASS="$SSH_PASS"
          sshpass -e rsync -avz \
            --rsh="ssh -o StrictHostKeyChecking=no \
                       -o UserKnownHostsFile=~/.ssh/known_hosts \
                       -o BatchMode=no \
                       -o PubkeyAuthentication=no" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='.venv' \
            --exclude='.ipynb_checkpoints' \
            . "$SSH_USER@$SSH_HOST:~/cvcs2026/MDN-C-CS/" || exit 1

          echo "Deploy completed successfully!"