name: Deploy to Cluster

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          # Debug: Verify key was written
          echo "SSH key size: $(wc -c < ~/.ssh/id_ed25519) bytes"
          head -1 ~/.ssh/id_ed25519
          tail -1 ~/.ssh/id_ed25519
          
          ssh-keyscan -t ed25519 "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # Test SSH connection with verbose output
          echo "Testing SSH connection..."
          ssh -vv -o StrictHostKeyChecking=accept-new -o ConnectTimeout=5 "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" "echo 'SSH connection successful!'" 2>&1 | head -50

      - name: Copy files to cluster
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rsync
          echo "Copying files to cluster..."
          rsync -avz \
            -e "ssh -o StrictHostKeyChecking=accept-new" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='.venv' \
            --exclude='.ipynb_checkpoints' \
            . "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:~/cvcs2026/MDN-C-CS/"
