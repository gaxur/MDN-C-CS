name: Deploy to Cluster

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to cluster
        env:
          SSH_PASS: ${{ secrets.SSH_PASSWORD }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          # Install dependencies
          sudo apt-get update -y
          sudo apt-get install -y sshpass rsync

          # Add host to known_hosts
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa,ed25519 "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          # Copy files using rsync with sshpass
          echo "Copying files to cluster..."
          sshpass -p "$SSH_PASS" rsync -avz \
            --rsh="sshpass -p $SSH_PASS ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='.venv' \
            --exclude='.ipynb_checkpoints' \
            . "$SSH_USER@$SSH_HOST:~/cvcs2026/MDN-C-CS/" || exit 1
          
          echo "Deploy completed successfully!"
