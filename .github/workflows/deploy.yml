name: Deploy to Cluster

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to cluster
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          # Install sshpass and rsync
          sudo apt-get update -y
          sudo apt-get install -y sshpass rsync

          # Set up SSH configuration
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Add host to known_hosts
          ssh-keyscan -t ed25519 "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          # Configure SSH to use password authentication and skip pubkey
          cat > ~/.ssh/config <<EOF
Host *
    StrictHostKeyChecking accept-new
    PreferredAuthentications password,keyboard-interactive
    PubkeyAuthentication no
    ConnectTimeout 10
    UserKnownHostsFile ~/.ssh/known_hosts
EOF
          chmod 600 ~/.ssh/config

          # Use rsync to copy files with exclusions via sshpass
          echo "Copying files to cluster..."
          sshpass -e rsync -avz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='.venv' \
            --exclude='.ipynb_checkpoints' \
            . "${SSH_USER}@${SSH_HOST}:~/cvcs2026/MDN-C-CS/"
